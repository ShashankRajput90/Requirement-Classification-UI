<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Story Classifier | AI Powered</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js & Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@3.0.0/dist/chartjs-chart-treemap.min.js"></script>
    <!-- Plotly.js for Sunburst -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Tailwind Configuration for Custom Colors if needed -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e32',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>
</head>

<body
    class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 overflow-hidden transition-colors duration-300">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside
            class="w-20 hover:w-64 transition-all duration-300 ease-in-out group bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 flex flex-col z-20 overflow-hidden shadow-lg dark:shadow-none">
            {% include 'sidebar.html' %}
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto relative">
            <!-- Background Gradients -->
            <div
                class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10 bg-white dark:bg-gray-900">
                <div
                    class="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] bg-blue-500/10 dark:bg-blue-600/20 rounded-full blur-[100px]">
                </div>
                <div
                    class="absolute bottom-[-20%] left-[-10%] w-[500px] h-[500px] bg-purple-500/10 dark:bg-purple-600/20 rounded-full blur-[100px]">
                </div>
            </div>

            <div class="p-8 max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}

    <!-- ============================================================ -->
    <!-- Global Batch Progress Pill (visible from any page)           -->
    <!-- ============================================================ -->
    <div id="batchProgressPill"
        class="hidden fixed bottom-6 right-6 z-50
               flex items-center gap-3
               px-4 py-3 rounded-2xl
               bg-white/90 dark:bg-slate-800/95
               border border-blue-200 dark:border-blue-500/30
               shadow-[0_8px_32px_rgba(59,130,246,0.18)] dark:shadow-[0_8px_32px_rgba(99,102,241,0.22)]
               backdrop-blur-md
               translate-y-4 opacity-0
               transition-all duration-500 ease-out"
        style="min-width:260px; max-width:320px;">

        <!-- Spinner icon -->
        <span id="batchPillIcon" class="shrink-0">
            <svg class="animate-spin w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </span>

        <!-- Text + bar -->
        <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1.5">
                <span class="text-xs font-semibold text-gray-700 dark:text-gray-200" id="batchPillLabel">Processing…</span>
                <span class="text-xs text-gray-400 dark:text-gray-500 font-mono" id="batchPillCount"></span>
            </div>
            <!-- Progress bar track -->
            <div class="h-1.5 bg-gray-200 dark:bg-slate-700 rounded-full overflow-hidden">
                <div id="batchPillBar"
                    class="h-full rounded-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500"
                    style="width:0%">
                </div>
            </div>
        </div>

        <!-- Jump link -->
        <a href="/batch" title="Go to Batch page"
            class="shrink-0 p-1.5 rounded-lg text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
        </a>
        <!-- Stop button -->
        <button id="batchStopBtn" onclick="stopBatch()" title="Stop batch processing"
            class="shrink-0 p-1.5 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <script>
    (function () {
        const pill    = document.getElementById('batchProgressPill');
        const bar     = document.getElementById('batchPillBar');
        const label   = document.getElementById('batchPillLabel');
        const count   = document.getElementById('batchPillCount');
        const icon    = document.getElementById('batchPillIcon');
        const stopBtn = document.getElementById('batchStopBtn');
        let pollTimer = null;
        let doneTimer = null;
        let isRunning = false;

        const IDLE_INTERVAL    = 10000;  // 10s when nothing is happening
        const RUNNING_INTERVAL = 2500;   // 2.5s during active batch

        function showPill() {
            pill.classList.remove('hidden');
            requestAnimationFrame(() => {
                pill.classList.remove('translate-y-4', 'opacity-0');
            });
        }

        function hidePill() {
            pill.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => pill.classList.add('hidden'), 500);
        }

        function setInterval_(ms) {
            // Restart the poll timer at the given cadence
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(pollStatus, ms);
        }

        async function stopBatch() {
            try {
                stopBtn.disabled = true;
                label.textContent = 'Stopping…';
                await fetch('/api/batch/stop', { method: 'POST' });
            } catch (_) {}
        }

        async function pollStatus() {
            try {
                const res  = await fetch('/api/batch/status');
                if (!res.ok) return;
                const data = await res.json();

                if (data.status === 'running') {
                    if (!isRunning) {
                        isRunning = true;
                        stopBtn.disabled = false;
                        stopBtn.classList.remove('hidden');
                        setInterval_(RUNNING_INTERVAL);  // speed up
                    }
                    showPill();
                    const pct = data.total > 0 ? Math.round((data.processed / data.total) * 100) : 0;
                    bar.style.width   = pct + '%';
                    label.textContent = 'Batch Processing…';
                    count.textContent = `${data.processed} / ${data.total}`;
                    icon.innerHTML = `<svg class="animate-spin w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>`;

                } else if (data.status === 'done') {
                    isRunning = false;
                    stopBtn.classList.add('hidden');
                    setInterval_(IDLE_INTERVAL);  // slow back down
                    bar.style.width   = '100%';
                    bar.className     = bar.className.replace('from-blue-500 to-purple-500', 'from-emerald-500 to-teal-500');
                    label.textContent = 'Batch Complete ✓';
                    count.textContent = `${data.total} / ${data.total}`;
                    icon.innerHTML = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>`;
                    clearTimeout(doneTimer);
                    doneTimer = setTimeout(hidePill, 4000);

                } else if (data.status === 'stopped') {
                    isRunning = false;
                    stopBtn.classList.add('hidden');
                    setInterval_(IDLE_INTERVAL);
                    bar.style.width   = bar.style.width;  // freeze at current %
                    bar.className     = bar.className.replace('from-blue-500 to-purple-500', 'from-red-500 to-orange-400');
                    label.textContent = 'Stopped';
                    count.textContent = '';
                    icon.innerHTML = `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>`;
                    clearTimeout(doneTimer);
                    doneTimer = setTimeout(hidePill, 3000);

                } else {
                    // idle
                    if (isRunning) {
                        isRunning = false;
                        stopBtn.classList.add('hidden');
                        setInterval_(IDLE_INTERVAL);
                    }
                    hidePill();
                }
            } catch (_) { /* silent fail — not logged in or network issue */ }
        }

        // Start with slow idle polling
        pollTimer = setInterval(pollStatus, IDLE_INTERVAL);
        pollStatus(); // immediate first check
    })();
    </script>
</body>

</html>
