{% extends "base_auth.html" %}

{% block title %}Sign up — NFR Classifier{% endblock %}

{% block content %}

<div class="form-header">
  <h1>Create account</h1>
  <p>Get started — it only takes a minute</p>
</div>

{% if error %}
<div class="alert-error">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  {{ error }}
</div>
{% endif %}

<form method="POST" action="{{ url_for('signup') }}" autocomplete="on">

  <div class="form-group">
    <label for="name">Full name</label>
    <div class="input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <input type="text" id="name" name="name" placeholder="Jane Doe" required autofocus autocomplete="name"/>
    </div>
  </div>

  <div class="form-group">
    <label for="email">Email address</label>
    <div class="input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="username"/>
    </div>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password"
             oninput="checkStrength(this.value)"/>
      <button type="button" class="eye-toggle" onclick="togglePassword('password', this)" tabindex="-1">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <!-- Eye icon (visible) -->
          <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          <!-- Eye slashed icon (hidden), initially hidden via inline style -->
          <path class="eye-closed" style="display:none;" stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
        </svg>
      </button>
    </div>

    <!-- Password strength bar -->
    <div id="strengthBar" style="margin-top:0.5rem; display:none;">
      <div style="height:3px; background:#1f1f23; border-radius:2px; overflow:hidden;">
        <div id="strengthFill" style="height:100%; width:0%; border-radius:2px; transition:width 0.3s, background 0.3s;"></div>
      </div>
      <span id="strengthLabel" style="font-size:0.75rem; color:#52525b; margin-top:0.3rem; display:block;"></span>
    </div>
  </div>

  <button type="submit" class="btn-primary" style="margin-top:0.5rem;">Create account</button>

  <div class="divider">or sign up with</div>

  <a href="{{ url_for('google_login') }}" class="btn-google">
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.7 13.2 17.9 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.4-4.1 7-10.1 7-17.1z"/>
      <path fill="#FBBC05" d="M10.9 28.6A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l8.3-6.2z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6.1 0-11.3-3.7-13.1-9l-7.9 6.1C6.9 42.6 14.8 48 24 48z"/>
    </svg>
    Google
  </a>

</form>

<div class="auth-switch">
  Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
</div>

<script>
function checkStrength(val) {
  const bar   = document.getElementById('strengthBar');
  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');

  if (!val) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';

  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { pct: '20%', color: '#ef4444', text: 'Very weak' },
    { pct: '40%', color: '#f97316', text: 'Weak' },
    { pct: '60%', color: '#eab308', text: 'Fair' },
    { pct: '80%', color: '#22c55e', text: 'Strong' },
    { pct: '100%', color: '#34d399', text: 'Very strong' },
  ];

  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  fill.style.width      = lvl.pct;
  fill.style.background = lvl.color;
  label.textContent     = lvl.text;
  label.style.color     = lvl.color;
}

function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const iconOpen = btn.querySelectorAll('.eye-open');
  const iconClosed = btn.querySelector('.eye-closed');
  
  if (input.type === 'password') {
    input.type = 'text';
    iconOpen.forEach(p => p.style.display = 'none');
    iconClosed.style.display = 'block';
  } else {
    input.type = 'password';
    iconOpen.forEach(p => p.style.display = 'block');
    iconClosed.style.display = 'none';
  }
}
</script>

{% endblock %}
